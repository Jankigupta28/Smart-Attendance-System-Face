<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance Login</title>
    <link rel="stylesheet" href="login.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <div class="container">
        <div class="card">

            <div class="logo-box">
                <i class='bx bx-scan'></i>
            </div>

            <h2>Smart Attendance <br>System</h2>
            <p>Login to continue</p>

            <div class="login-tabs">
                <button class="tab-btn active" onclick="switchLogin('user')">User Login</button>
                <button class="tab-btn" onclick="switchLogin('admin')">Admin Login</button>
            </div>

            <form id="loginForm">

                <div class="input-box">
                    <i class='bx bx-user input-icon'></i>
                    <input type="text" placeholder="Email or ID" required>
                </div>

                <div class="input-box">
                    <i class='bx bx-lock-alt input-icon'></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <div class="options">
                    <label>
                        <input type="checkbox">
                        Remember me
                    </label>

                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="btn">Login</button>

            </form>

            <p class="link">
                Don’t have an account?
                <a href="register.html">Register Here</a>
            </p>

        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
