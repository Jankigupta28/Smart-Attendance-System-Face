<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance</title>
    <link rel="stylesheet" href="mark-attendance.css">
</head>

<body>

    <div class="attendance-wrapper">

        <h2>Mark Attendance</h2>


        <div class="card">
            <h3>Step 1: Location Check</h3>
            <div class="location-box" style="display: flex; align-items: center; gap: 15px;">
                <div class="icon">📍</div>
                <div style="flex-grow: 1;">
                    <p id="locationStatus" style="margin: 0; font-weight: bold;">Checking location...</p>
                    <small id="locationDetails" style="color: #666;"></small>
                </div>
                <div id="locationTick">❌</div>
            </div>
        </div>

        <div class="card">
            <h3>Step 2: Face Scan</h3>

            <div class="camera-box">
                <video id="video" autoplay muted></video>
                <div class="face-frame"></div>
            </div>

            <p id="faceStatus">Status: Not Verified</p>

            <button id="scanBtn">Scan Face</button>
        </div>

        <button id="confirmBtn" disabled>Confirm Attendance</button>

    </div>

    <script src="mark-attendance.js"></script>
</body>

</html>
